# HTTPS 서버 블록 — Flutter web 정적 서빙 + /api 리버스 프록시
server {
    listen 443 ssl http2;
    server_name porta-ai.com www.porta-ai.com;

    # SSL 설정
    ssl_certificate /etc/letsencrypt/live/porta-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/porta-ai.com/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Flutter web 정적 파일 루트
    root /usr/share/nginx/html;
    index index.html;

    # ---- 백엔드 API: /api/* → FastAPI (/api 프리픽스 제거) ----
    # 예) /api/portfolio → http://porta_backend/portfolio
    location /api/ {
        proxy_pass http://porta_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---- 헬스체크 (컨테이너 healthcheck + 외부 모니터링) → 백엔드 ----
    location = /health {
        proxy_pass http://porta_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- Swagger / OpenAPI 문서 (편의용, 루트 경로 유지) ----
    location /docs {
        proxy_pass http://porta_backend/docs;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://porta_backend/redoc;
        proxy_set_header Host $host;
    }
    location = /openapi.json {
        proxy_pass http://porta_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # ---- Flutter SPA: 정적 파일 우선, 없으면 index.html (클라이언트 라우팅) ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP to HTTPS 리다이렉션
server {
    listen 80;
    server_name porta-ai.com www.porta-ai.com;

    # Let's Encrypt 인증서 갱신을 위한 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 모든 HTTP 요청을 HTTPS로 리다이렉션
    location / {
        return 301 https://$host$request_uri;
    }
}
