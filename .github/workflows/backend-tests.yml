name: Backend Tests

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-tests.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-tests.yml"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      # 현재 green인 테스트 경로만 게이트로 사용한다.
      # 스테일 테스트 모듈(usecase/repo/clients 일부, integration/e2e)은
      # 재작성이 끝나는 대로 아래 목록에 추가할 것.
      - name: Run unit tests (green set)
        run: >
          uv run pytest -q
          tests/unit/test_graph/
          tests/unit/test_clients/
          tests/unit/test_data/
        env:
          TESTING: "1"
          OPENAI_API_KEY: test-openai-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-supabase-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
